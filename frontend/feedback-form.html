<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - CIVIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/theme.css" rel="stylesheet">
    <style>
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: "Segoe UI", sans-serif;
            min-height: 100vh;
        }
        .feedback-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .rating-stars {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }
        .rating-stars:hover,
        .rating-stars.active {
            color: #fbbf24;
        }
        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background: var(--bg-input);
            border-color: #0d6efd;
            color: var(--text-primary);
        }
        .btn-submit {
            background: linear-gradient(135deg, #0d6efd, #4f8dfd);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0b5ed7, #3d7dfd);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }
        .complaint-info {
            background: linear-gradient(135deg, #f8fbff, #edf4ff);
            border: 1px solid rgba(13, 110, 253, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/citizen-profile.html">
                <i class="fas fa-city me-2"></i>CIVIX
            </a>
            <div class="ms-auto">
                <a class="nav-link text-white" href="/citizen-profile.html">
                    <i class="fas fa-arrow-left me-1"></i>Back to Profile
                </a>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="container mt-5">
        <div class="feedback-card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-star text-warning fa-3x mb-3"></i>
                <h2 class="fw-bold">Submit Your Feedback</h2>
                <p class="text-muted">Help us improve our services by sharing your experience</p>
            </div>

            <!-- Complaint Info (if available) -->
            <div id="complaintInfo" class="complaint-info" style="display: none;">
                <h6 class="fw-bold text-primary mb-2">
                    <i class="fas fa-clipboard-list me-2"></i>Complaint Details
                </h6>
                <div class="row">
                    <div class="col-md-6">
                        <small class="text-muted">Complaint ID:</small>
                        <p id="feedbackComplaintId" class="fw-bold mb-0">--</p>
                    </div>
                    <div class="col-md-6">
                        <small class="text-muted">Category:</small>
                        <p id="feedbackCategory" class="fw-bold mb-0">--</p>
                    </div>
                </div>
            </div>

            <form id="feedbackForm">
                <input type="hidden" id="complaintId">
                
                <!-- Rating -->
                <div class="mb-4">
                    <label class="form-label fw-bold">How satisfied are you with the resolution? *</label>
                    <div class="text-center">
                        <div id="ratingStars" class="rating-container">
                            <i class="fas fa-star rating-stars" data-rating="1"></i>
                            <i class="fas fa-star rating-stars" data-rating="2"></i>
                            <i class="fas fa-star rating-stars" data-rating="3"></i>
                            <i class="fas fa-star rating-stars" data-rating="4"></i>
                            <i class="fas fa-star rating-stars" data-rating="5"></i>
                        </div>
                        <small id="ratingText" class="text-muted">Please select a rating</small>
                    </div>
                    <input type="hidden" id="rating" name="rating" required>
                </div>

                <!-- Feedback Message -->
                <div class="mb-4">
                    <label for="feedbackMessage" class="form-label fw-bold">Your Feedback *</label>
                    <textarea class="form-control" id="feedbackMessage" name="message" rows="4" 
                              placeholder="Share your experience, suggestions, or concerns..." required></textarea>
                    <small class="text-muted">Minimum 10 characters</small>
                </div>

                <!-- Category -->
                <div class="mb-4">
                    <label for="feedbackCategory" class="form-label fw-bold">Feedback Category</label>
                    <select class="form-select" id="feedbackCategory" name="category">
                        <option value="General">General</option>
                        <option value="Service Quality">Service Quality</option>
                        <option value="Response Time">Response Time</option>
                        <option value="Staff Behavior">Staff Behavior</option>
                        <option value="Resolution Quality">Resolution Quality</option>
                        <option value="Communication">Communication</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Additional Info -->
                <div class="mb-4">
                    <label for="additionalInfo" class="form-label fw-bold">Additional Comments (Optional)</label>
                    <textarea class="form-control" id="additionalInfo" name="additionalInfo" rows="2" 
                              placeholder="Any additional information you'd like to share..."></textarea>
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-submit">
                        <i class="fas fa-paper-plane me-2"></i>Submit Feedback
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
                    <h4 class="fw-bold">Thank You!</h4>
                    <p class="text-muted">Your feedback has been submitted successfully. We appreciate your input!</p>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="redirectToProfile()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRating = 0;
        let currentUser = null;

        // Load user data and complaint info
        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
            loadComplaintInfo();
            initializeRatingStars();
        });

        function loadUserData() {
            try {
                const stored = localStorage.getItem('currentUser') || localStorage.getItem('user');
                if (stored) {
                    currentUser = JSON.parse(stored);
                }
            } catch (e) {
                console.error("Error loading user data", e);
            }
        }

        function loadComplaintInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const complaintId = urlParams.get('complaint_id');
            
            if (complaintId) {
                document.getElementById('complaintId').value = complaintId;
                document.getElementById('feedbackComplaintId').textContent = complaintId;
                
                // Load complaint details
                fetch(`http://127.0.0.1:8000/api/complaints/${complaintId}/`)
                    .then(r => r.json())
                    .then(json => {
                        if (json.success) {
                            const complaint = json.complaint;
                            document.getElementById('feedbackCategory').textContent = complaint.category || 'General';
                            document.getElementById('complaintInfo').style.display = 'block';
                        }
                    })
                    .catch(err => console.error('Error loading complaint:', err));
            }
        }

        function initializeRatingStars() {
            const stars = document.querySelectorAll('.rating-stars');
            
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    selectedRating = parseInt(this.dataset.rating);
                    updateRatingDisplay(selectedRating);
                    document.getElementById('rating').value = selectedRating;
                });
                
                star.addEventListener('mouseenter', function() {
                    const hoverRating = parseInt(this.dataset.rating);
                    updateRatingDisplay(hoverRating);
                });
            });
            
            document.getElementById('ratingStars').addEventListener('mouseleave', function() {
                updateRatingDisplay(selectedRating);
            });
        }

        function updateRatingDisplay(rating) {
            const stars = document.querySelectorAll('.rating-stars');
            const ratingText = document.getElementById('ratingText');
            
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
            
            const ratingTexts = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
            ratingText.textContent = rating > 0 ? ratingTexts[rating] : 'Please select a rating';
        }

        // Form submission
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const rating = document.getElementById('rating').value;
            const message = document.getElementById('feedbackMessage').value.trim();
            const category = document.getElementById('feedbackCategory').value;
            
            if (!rating || !message) {
                alert('Please provide both rating and feedback message.');
                return;
            }
            
            if (message.length < 10) {
                alert('Feedback message must be at least 10 characters long.');
                return;
            }
            
            const complaintId = document.getElementById('complaintId').value;
            
            const feedbackData = {
                complaint_id: complaintId || 'general',
                citizen_name: currentUser ? currentUser.name : 'Anonymous',
                rating: parseInt(rating),
                message: message,
                category: category,
                resolved_by: 'system' // This would normally come from the complaint data
            };
            
            // Submit feedback
            fetch('http://127.0.0.1:8000/api/complaints/feedback/submit/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(feedbackData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Show success modal
                    const modal = new bootstrap.Modal(document.getElementById('successModal'));
                    modal.show();
                } else {
                    alert('Error submitting feedback: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error submitting feedback. Please try again.');
            });
        });

        function redirectToProfile() {
            window.location.href = '/citizen-profile.html';
        }
    </script>
</body>
</html>
